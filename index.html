<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabungan Qurban Keluarga Setiakawan</title>
  <style>
    :root {
      --primary: #1b5e20;
      --primary-light: #e8f5e9;
      --gradient-start: #2e7d32;
      --gradient-end: #155724;
      --dark: #212529;
      --gray: #6c757d;
      --light-bg: #f8f9fa;
      --success: #28a745;
      --danger: #dc3545;
      --warning: #f39c12;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
    body { background-color: #eceff1; color: var(--dark); padding: 20px 15px; display: flex; justify-content: center; align-items: start; min-height: 100vh; }
    
    .app-container { background: white; width: 100%; max-width: 480px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); padding: 25px; position: relative; }
    
    /* Header & Balance */
    .header { text-align: center; margin-bottom: 25px; }
    .logo-wrapper { width: 85px; height: 85px; margin: 0 auto 12px; background: var(--primary-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 2px solid var(--primary); overflow: hidden; }
    .logo-img { width: 100%; height: 100%; object-fit: cover; }
    .header h1 { font-size: 22px; color: var(--primary); font-weight: 700; letter-spacing: -0.5px; }
    .header p { font-size: 13px; color: var(--gray); margin-top: 2px; }

    .balance-card { background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end)); color: white; padding: 22px; border-radius: 16px; text-align: center; margin-bottom: 20px; box-shadow: 0 6px 20px rgba(46, 125, 50, 0.25); }
    .balance-card span { font-size: 12px; opacity: 0.85; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 600; }
    .balance-card h2 { font-size: 34px; margin-top: 6px; font-weight: 700; }

    /* Member List & Mini Calendar */
    .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 0 4px; }
    .section-header h3 { font-size: 15px; font-weight: 700; color: var(--dark); }
    
    .member-list { list-style: none; }
    .member-item { background: var(--light-bg); border: 1px solid #edf2f7; padding: 16px; border-radius: 14px; margin-bottom: 12px; display: flex; flex-direction: column; transition: all 0.2s ease; }
    .member-main { display: flex; justify-content: space-between; align-items: center; width: 100%; }
    .member-name { font-weight: 600; font-size: 16px; color: #2d3748; }
    
    .status-badge { padding: 6px 14px; border-radius: 30px; font-size: 12px; font-weight: 700; }
    .status-badge.success { background: #e6f4ea; color: var(--success); }
    .status-badge.danger { background: #fce8e6; color: var(--danger); }
    
    .mini-calendar { display: flex; justify-content: space-between; margin-top: 15px; padding-top: 15px; border-top: 1px dashed #ced4da; cursor: pointer; }
    .mini-day { width: 38px; height: 38px; border-radius: 10px; background: #e9ecef; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: var(--gray); border: 2px solid transparent; transition: transform 0.2s; }
    .mini-day span { font-size: 9px; font-weight: 500; text-transform: uppercase; margin-bottom: 2px; }
    .mini-day.paid { background: var(--success); color: white; box-shadow: 0 4px 10px rgba(40, 167, 69, 0.3); }
    .mini-day.today { border-color: var(--primary); background: #e8f5e9; color: var(--primary); }
    .mini-day.paid.today { background: var(--success); color: white; border-color: #1e7e34; }
    .mini-calendar:hover .mini-day { transform: translateY(-2px); }
    
    /* Full Calendar Modal */
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 999; display: flex; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(4px); }
    .modal-content { background: white; width: 100%; max-width: 380px; border-radius: 20px; padding: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
    .modal-title { text-align: center; font-size: 18px; color: var(--primary); font-weight: 700; margin-bottom: 5px; }
    .modal-subtitle { text-align: center; font-size: 13px; color: var(--gray); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
    .cal-header { font-size: 11px; font-weight: 700; color: var(--gray); text-align: center; padding-bottom: 5px; }
    .cal-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: #f8f9fa; border-radius: 8px; font-size: 13px; font-weight: 600; color: var(--dark); border: 1px solid #edf2f7; }
    .cal-cell.paid { background: var(--success); color: white; border-color: var(--success); }
    .cal-cell.today { border: 2px solid var(--primary); color: var(--primary); }
    .cal-cell.paid.today { border-color: #1e7e34; }
    .cal-cell.empty { background: transparent; border: none; }
    
    /* Buttons */
    .btn-block { background: #343a40; color: white; border: none; padding: 14px; width: 100%; border-radius: 12px; cursor: pointer; font-size: 15px; font-weight: 600; margin-top: 20px; }
    .btn-close { background: #e9ecef; color: var(--dark); margin-top: 25px; }
    
    .admin-actions { display: flex; gap: 8px; margin-top: 15px; width: 100%; }
    .btn-action { padding: 8px; border-radius: 8px; font-size: 12px; color: white; border: none; cursor: pointer; font-weight: 600; flex: 1; transition: opacity 0.2s; }
    .btn-action:hover { opacity: 0.8; }
    .btn-pay { background: var(--primary); flex: 2; }
    .btn-edit { background: var(--warning); }
    .btn-delete { background: var(--danger); }
    
    .hidden { display: none !important; }
    .loading-text { text-align: center; color: var(--gray); padding: 30px 0; font-style: italic; }
  </style>
</head>
<body>

  <div class="app-container">
    <div id="view-public">
      <div class="header">
        <div class="logo-wrapper">
          <img src="logo-keluarga.png" class="logo-img" alt="Logo">
        </div>
        <h1>Keluarga Setiakawan</h1>
        <p>Tabungan Qurban Harian • Rp 10.000 / Hari</p>
      </div>

      <div class="balance-card">
        <span>Total Saldo Terkumpul</span>
        <h2 id="total-saldo">Rp 0</h2>
      </div>

      <div class="section-header">
        <h3>Status Setoran</h3>
        <span style="font-size:12px; color:#6c757d;">Klik kalender untuk detail</span>
      </div>

      <div id="db-loading" class="loading-text">Menghubungkan ke database...</div>
      <ul id="list-public" class="member-list"></ul>

      <button class="btn-block" id="btn-to-login">🔑 Masuk Panel Admin</button>
    </div>

    <div id="view-admin" class="hidden">
      <div class="header">
        <h1>⚙️ Panel Admin</h1>
        <p>Kelola Anggota & Saldo</p>
      </div>
      
      <button class="btn-block" style="background: var(--success); margin-top: 0; margin-bottom: 20px;" onclick="addMember()">➕ Tambah Anggota Baru</button>

      <ul id="list-admin" class="member-list"></ul>

      <button class="btn-block" style="background: #6c757d;" id="btn-to-public">🔙 Kembali ke Beranda</button>
    </div>
  </div>

  <div id="calendar-modal" class="modal-overlay hidden">
    <div class="modal-content" id="modal-body">
      </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // =================================================================
    // PASTE FIREBASE CONFIG KAMU DI SINI
    // =================================================================
    const firebaseConfig = {
      apiKey: "AIzaSyAp18CFhc_S2rLV6SAuUKRkOTZGjF06QrY",
      authDomain: "nabung-qurban.firebaseapp.com",
      projectId: "nabung-qurban",
      storageBucket: "nabung-qurban.firebasestorage.app",
      messagingSenderId: "919521574356",
      appId: "1:919521574356:web:f4b569f8377b29fd97aa41",
      measurementId: "G-T7QE7Z643J"
    };

    const PASSWORD_ADMIN = "admin123"; 

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const docRef = doc(db, "qurban", "config_data");

    function getLocalDateString(d) {
      return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,'0') + "-" + String(d.getDate()).padStart(2,'0');
    }
    const dayNamesMini = ['Min', 'Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab'];
    const todayStr = getLocalDateString(new Date());

    let cloudData = {};

    onSnapshot(docRef, (snapshot) => {
      document.getElementById("db-loading").classList.add("hidden");
      if (snapshot.exists()) {
        cloudData = snapshot.data();
        updatePublicUI();
        updateAdminUI();
      }
    });

    // RENDER PUBLIK
    function updatePublicUI() {
      document.getElementById("total-saldo").innerText = formatRupiah(cloudData.totalSaldo);
      const container = document.getElementById("list-public");
      container.innerHTML = "";

      Object.keys(cloudData.members).sort().forEach(id => {
        const m = cloudData.members[id];
        const isPaidToday = m.paidDates && m.paidDates.includes(todayStr);
        const badge = isPaidToday 
          ? `<span class="status-badge success">Sudah ✓</span>` 
          : `<span class="status-badge danger">Belum ✗</span>`;

        container.innerHTML += `
          <li class="member-item">
            <div class="member-main">
              <span class="member-name">${m.name}</span>
              ${badge}
            </div>
            ${buildMiniCalendar(m, id)}
          </li>`;
      });
    }

    // RENDER ADMIN DENGAN TOMBOL CRUD
    function updateAdminUI() {
      const container = document.getElementById("list-admin");
      container.innerHTML = "";

      Object.keys(cloudData.members).sort().forEach(id => {
        const m = cloudData.members[id];
        container.innerHTML += `
          <li class="member-item">
            <div class="member-main">
              <span class="member-name">${m.name}</span>
            </div>
            <div class="admin-actions">
              <button class="btn-action btn-pay" onclick="processPayment('${id}')">Setor</button>
              <button class="btn-action btn-edit" onclick="editMember('${id}')">✏️ Edit</button>
              <button class="btn-action btn-delete" onclick="deleteMember('${id}')">🗑️ Hapus</button>
            </div>
          </li>`;
      });
    }

    // GENERATOR MINI CALENDAR (5 HARI)
    window.buildMiniCalendar = function(member, id) {
      const now = new Date();
      let html = `<div class="mini-calendar" onclick="openFullCalendar('${id}')" title="Klik untuk lihat bulan ini">`;
      for(let i = -2; i <= 2; i++) {
        let d = new Date();
        d.setDate(now.getDate() + i);
        let dStr = getLocalDateString(d);
        let isPaid = member.paidDates && member.paidDates.includes(dStr);
        let isToday = i === 0;

        let classes = "mini-day";
        if(isPaid) classes += " paid";
        if(isToday) classes += " today";

        html += `<div class="${classes}"><span>${dayNamesMini[d.getDay()]}</span>${isPaid ? '✓' : d.getDate()}</div>`;
      }
      html += `</div>`;
      return html;
    }

    // GENERATOR FULL CALENDAR (MODAL)
    window.openFullCalendar = function(id) {
      const member = cloudData.members[id];
      const now = new Date();
      const year = now.getFullYear();
      const month = now.getMonth();
      
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const firstDayIndex = new Date(year, month, 1).getDay(); 

      let html = `<div class="modal-title">${member.name}</div>`;
      html += `<div class="modal-subtitle">${now.toLocaleDateString('id-ID', {month:'long', year:'numeric'})}</div>`;
      
      html += `<div class="calendar-grid">`;
      dayNamesMini.forEach(d => html += `<div class="cal-header">${d}</div>`);

      for(let i=0; i<firstDayIndex; i++) html += `<div class="cal-cell empty"></div>`;

      for(let d=1; d<=daysInMonth; d++) {
        const dStr = getLocalDateString(new Date(year, month, d));
        const isPaid = member.paidDates && member.paidDates.includes(dStr);
        let classes = `cal-cell ${isPaid ? 'paid' : ''} ${dStr === todayStr ? 'today' : ''}`;
        html += `<div class="${classes}">${isPaid ? '✓' : d}</div>`;
      }
      
      html += `</div><button class="btn-block btn-close" onclick="closeCalendar()">Tutup Kalender</button>`;

      document.getElementById('modal-body').innerHTML = html;
      document.getElementById('calendar-modal').classList.remove('hidden');
    }

    window.closeCalendar = function() { document.getElementById('calendar-modal').classList.add('hidden'); }

    // FITUR: INPUT SETORAN
    window.processPayment = async function(id) {
      const member = cloudData.members[id];
      const inputHari = prompt(`Berapa hari setoran untuk ${member.name}?\n1 = Rp 10rb, 5 = Rp 50rb`, "1");
      
      if (!inputHari) return; 
      const jmlHari = parseInt(inputHari);
      if (isNaN(jmlHari) || jmlHari <= 0) return;

      if(!member.paidDates) member.paidDates = [];
      let added = 0, checkDate = new Date();

      while(added < jmlHari) {
        let dStr = getLocalDateString(checkDate);
        if(!member.paidDates.includes(dStr)) {
          member.paidDates.push(dStr);
          added++;
        }
        checkDate.setDate(checkDate.getDate() + 1); 
      }
      cloudData.totalSaldo += (jmlHari * 10000);
      await updateDoc(docRef, { totalSaldo: cloudData.totalSaldo, [`members.${id}.paidDates`]: member.paidDates });
    }

    // FITUR: TAMBAH ANGGOTA
    window.addMember = async function() {
      const newName = prompt("Masukkan nama anggota baru:");
      if(newName && newName.trim() !== "") {
        const newId = "user_" + Date.now();
        await updateDoc(docRef, { [`members.${newId}`]: { name: newName.trim(), paidDates: [] } });
      }
    };

    // FITUR: EDIT NAMA
    window.editMember = async function(id) {
      const oldName = cloudData.members[id].name;
      const newName = prompt("Ubah nama anggota:", oldName);
      if(newName && newName.trim() !== "" && newName !== oldName) {
        await updateDoc(docRef, { [`members.${id}.name`]: newName.trim() });
      }
    };

    // FITUR: HAPUS ANGGOTA
    window.deleteMember = async function(id) {
      const name = cloudData.members[id].name;
      if(confirm(`HAPUS ANGGOTA:\nYakin ingin menghapus ${name} dari daftar?\n\n(Catatan: Total Saldo keseluruhan sengaja tidak dikurangi otomatis agar uang kas di bank tetap klop dengan catatan web)`)) {
        const updatedMembers = { ...cloudData.members };
        delete updatedMembers[id];
        await updateDoc(docRef, { members: updatedMembers });
      }
    };

    function formatRupiah(val) { return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(val); }

    // NAVIGASI LOGIN
    document.getElementById("btn-to-login").addEventListener("click", () => {
      const pass = prompt("Masukkan Password Admin:");
      if (pass === PASSWORD_ADMIN) {
        document.getElementById("view-public").classList.add("hidden");
        document.getElementById("view-admin").classList.remove("hidden");
      } else if (pass !== null) alert("Password salah!");
    });
    document.getElementById("btn-to-public").addEventListener("click", () => {
      document.getElementById("view-admin").classList.add("hidden");
      document.getElementById("view-public").classList.remove("hidden");
    });
  </script>
</body>
</html>
